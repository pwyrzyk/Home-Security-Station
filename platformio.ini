; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
monitor_port = /dev/cu.usbmodem1101
monitor_filters = time


upload_speed = 921600
upload_protocol = esptool
upload_port = /dev/cu.usbmodem1101

lib_deps =
    adafruit/Adafruit ADS1X15 @ ^2.4
    knolleary/PubSubClient @ ^2.8
    ottowinter/ESPAsyncWebServer-esphome @ ^3.1
    bblanchon/ArduinoJson @ ^7.0

build_flags =
    -DFIRMWARE_VERSION=\"1.0.16\"
    -DCORE_DEBUG_LEVEL=0
    -DOTA_PASSWORD=\"admin\"
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_ldf_mode = deep

board_build.flash_mode = dio
board_build.f_cpu = 160000000L
board_build.filesystem = littlefs

; ─── Slave Keypad Firmware ───────────────────────────────────────────────
; Each physical slave device must be compiled with its own SLAVE_ID.
; Change the build_flag -DSLAVE_ID=N below for each device (1..4).
[env:esp32-c3-slave]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200

upload_speed = 921600
upload_protocol = esptool

; Exclude all files from src/ and include only slave/ directory
build_src_filter = 
    +<../slave/>
    -<*>

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0
    marcoschwartz/LiquidCrystal_I2C @ ^1.1
    ottowinter/ESPAsyncWebServer-esphome @ ^3.1

build_flags =
    -DFIRMWARE_VERSION=\"1.0.0-slave\"
    -DCORE_DEBUG_LEVEL=0
    -DSLAVE_ID=1
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_ldf_mode = deep

board_build.flash_mode = dio
board_build.f_cpu = 160000000L
